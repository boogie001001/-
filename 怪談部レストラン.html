<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>怪談部レストラン</title>
    <style>
        @font-face {
            font-family: 'Suhgung21';
            src: local('Suhgung21'),
                 url('Suhgung21.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-weight: normal; 
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #000000;
        }

        body {
            display: flex;
            justify-content: center; 
            align-items: center;     
            font-family: 'Suhgung21', sans-serif;
            touch-action: none; 
            outline: none;
        }

        #game-stage {
            position: relative;
            height: 100vh;
            width: calc(100vh * (1920 / 1080)); 
            background-color: #000000;
            overflow: hidden; 
            font-family: 'Suhgung21', sans-serif;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .layer img {
            width: 100%;
            height: 100%;
            display: block;
        }

        #layer1-1 { z-index: 1; } 
        #layer1-2 { 
            z-index: 2; 
            animation: bgBlink 1s steps(1, end) infinite; 
        } 
        
        #layer-dodge {
            z-index: 3;
            mix-blend-mode: color-dodge;
            animation: dodgePulse 1s ease-in-out infinite alternate;
        }
        
        #c-layer { z-index: 13; }
        
        #red-layer {
            z-index: 14;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        
        #object-layer { z-index: 17; } 

        #ld-layer { 
            z-index: 22; 
            transition: opacity 0.5s ease; 
            opacity: 0; 
        } 
        #ld2-layer { 
            z-index: 23; 
            transition: opacity 0.5s ease; 
            opacity: 0; 
        } 
        
        #dialogue-box-layer { 
            z-index: 35; 
            transition: opacity 0.5s ease;
            opacity: 0;
        } 
        
        #dialogue-arrow-layer { 
            z-index: 36; 
            transition: opacity 0.5s ease;
            opacity: 0;
            animation: floatMotion 0.7s ease-in-out infinite alternate; 
        }

        #name-layer {
            z-index: 37;
            transition: opacity 0.5s ease;
            opacity: 0;
        }

        #name-text-container {
            position: absolute;
            left: 6.09375%;            
            top: 67.4074%;             
            width: 21.0417%;           
            height: 6.8519%;           
            z-index: 40; 
            display: flex;
            justify-content: center;   
            align-items: center;       
            text-align: center;
            color: #ffffff; 
            font-size: 22pt;           
            font-family: 'Suhgung21', sans-serif; 
            pointer-events: none; 
            background-color: rgba(0, 0, 0, 0); 
            transition: opacity 0.5s ease;
            opacity: 0;
        }

        #dialogue-container {
            position: absolute;
            left: 8.1771%;             
            top: 78.8889%;             
            width: 83.6458%;           
            height: 9.4444%;           
            z-index: 40; 
            display: flex;
            justify-content: flex-start; 
            align-items: center;         
            text-align: left;            
            color: #ffffff; 
            font-size: 18pt;             
            font-family: 'Suhgung21', sans-serif; 
            letter-spacing: 1px;
            pointer-events: none;
            background-color: rgba(0, 0, 0, 0);
            padding-left: 10px;          
            transition: opacity 0.5s ease;
            opacity: 0;
        }

        .intro-set {
            transition: opacity 0.8s ease;
            opacity: 1;
        }
        #intro-layer { z-index: 50; }
        #intro-on-layer { 
            z-index: 51; 
            animation: blinkEffect 0.8s ease-in-out infinite alternate;
        }
        #intro-top-layer { z-index: 52; }

        #start-btn {
            position: absolute;
            left: 22.34375%;
            top: 65.9259%;
            width: 55.3125%;
            height: 6.8518%;
            z-index: 55;
            background-color: rgba(0, 0, 0, 0); 
            cursor: pointer;
            pointer-events: auto; 
        }

        .block-zone {
            position: absolute; 
            background-color: rgba(0, 0, 0, 0); 
            z-index: 20; 
            pointer-events: none;
        }
        #zone1 { left: 0%; top: 0%; width: 100%; height: 33.24%; }
        #zone2 { top: 80.0926%; } 
        #zone3 { left: 7%; top: 3.70%; width: 20.44%; height: 43.70%; border-bottom-left-radius: 20%; }
        #zone4 { left: 72.55%; top: 3.70%; width: 20.44%; height: 43.70%; border-bottom-right-radius: 20%; }
        
        .talk-zone {
            position: absolute;
            background-color: rgba(0, 0, 0, 0);
            width: 10.8333%;           
            height: 20.3704%;          
            z-index: 20;
            pointer-events: none;
        }
        #active-talk-zone_1  { left: 48.5938%; top: 40.7407%; } 
        #active-talk-zone_2  { left: 40.625%;  top: 42.5%; }    
        #active-talk-zone_3  { left: 44.4792%; top: 46.5741%; } 
        #active-talk-zone_4  { left: 55.8854%; top: 50.1852%; } 
        #active-talk-zone_5  { left: 59.9479%; top: 46.9444%; } 
        #active-talk-zone_6  { left: 74.5313%; top: 45.2778%; } 
        #active-talk-zone_7  { left: 13.8021%; top: 38.6111%; } 
        #active-talk-zone_8  { left: 18.9063%; top: 41.7593%; } 
        #active-talk-zone_9  { left: 23.125%;  top: 42.4074%; } 
        #active-talk-zone_10 { left: 0%;        top: 34.7222%; width: 5.4167%; height: 20.3704%; } 

        #zone6  { left: 5.2604%;   top: 61.2037%; width: 10.4167%; height: 2.5926%; }  
        #zone7  { left: 11.8229%;  top: 80.0926%;  width: 10.4167%; height: 2.5926%; }  
        #zone8  { left: 27.7083%;  top: 70.7407%; width: 10.4167%; height: 2.5926%; }  
        #zone9  { left: 27.7083%;  top: 95.5556%; width: 12.1875%; height: 4.4444%; } 
        #zone10 { left: 61.9271%;  top: 70.7407%; width: 10.4167%; height: 2.5926%; }  
        #zone11 { left: 61.9271%;  top: 95.5556%; width: 12.1875%; height: 4.4444%; } 
        #zone12 { left: 84.375%;   top: 61.2037%; width: 10.4167%; height: 2.5926%; }  
        #zone13 { left: 77.8125%;  top: 80.0926%; width: 10.4167%; height: 2.5926%; }  

        #character {
            position: absolute; 
            width: 6.666%; 
            height: 11.851%;
            top: 37.037%; 
            left: 46.666%; 
            display: flex;
            z-index: 10; 
        }
        #character img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes bgBlink {
            0%, 49.9% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        @keyframes floatMotion {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        @keyframes blinkEffect {
            0% { opacity: 0.1; }
            100% { opacity: 1; }
        }
        @keyframes dodgePulse {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body tabindex="0">

        <div id="active-talk-zone_4" class="talk-zone"></div>
        <div id="active-talk-zone_5" class="talk-zone"></div>
        <div id="active-talk-zone_6" class="talk-zone"></div>
        <div id="active-talk-zone_7" class="talk-zone"></div>
        <div id="active-talk-zone_8" class="talk-zone"></div>
        <div id="active-talk-zone_9" class="talk-zone"></div>
        <div id="active-talk-zone_10" class="talk-zone"></div>

        <div id="start-btn"></div>

    <script>
        // 에셋 프리로드 파이프라인
        for (let i = 1; i <= 10; i++) {
            const rImg = new Image(); rImg.src = `red${i}.png`;
            const lImg = new Image(); lImg.src = `ld${i}.png`;
        }
        const subPreloads = ['ld1_2.png', 'ld1_3.png', 'ld3_2.png', 'ld5_2.png', 'ld9_2.png', 'ld9_3.png'];
        subPreloads.forEach(src => { const img = new Image(); img.src = src; });

        const ldLayer = document.getElementById('ld-layer');
        const ld2Layer = document.getElementById('ld2-layer');
        const ldImg = document.getElementById('ld-img');
        const ld2Img = document.getElementById('ld2-img');
        const nameLayer = document.getElementById('name-layer'); 
        const redLayer = document.getElementById('red-layer'); 
        const redImg = document.getElementById('red-img'); 
        const nameTextContainer = document.getElementById('name-text-container'); 
        const dialogueContainer = document.getElementById('dialogue-container'); 
        
        const dialogueBoxLayer = document.getElementById('dialogue-box-layer');
        const dialogueArrowLayer = document.getElementById('dialogue-arrow-layer');
        
        let ldState_1 = 0, ldState_2 = 0, ldState_3 = 0, ldState_4 = 0, ldState_5 = 0;
        let ldState_6 = 0, ldState_7 = 0, ldState_8 = 0, ldState_9 = 0, ldState_10 = 0;

        let globalCurrentZone = 0;
        
        // [고도화] 가속 키 관리를 처리하는 전용 Control 키 판정 플래그 스위치
        let isControlPressed = false;

        function isCharacterInActiveZone_1() { return (charX >= 933 && charX <= 933 + 208 && charY >= 440 && charY <= 440 + 220); }
        function isCharacterInActiveZone_2() { return (charX >= 780 && charX <= 780 + 208 && charY >= 459 && charY <= 459 + 220); }
        function isCharacterInActiveZone_3() { return (charX >= 854 && charX <= 854 + 208 && charY >= 503 && charY <= 503 + 220); }
        function isCharacterInActiveZone_4() { return (charX >= 1073 && charX <= 1073 + 208 && charY >= 542 && charY <= 542 + 220); }
        function isCharacterInActiveZone_5() { return (charX >= 1151 && charX <= 1151 + 208 && charY >= 507 && charY <= 507 + 220); }
        function isCharacterInActiveZone_6() { return (charX >= 1431 && charX <= 1431 + 208 && charY >= 489 && charY <= 489 + 220); }
        function isCharacterInActiveZone_7() { return (charX >= 265 && charX <= 265 + 208 && charY >= 417 && charY <= 417 + 220); }
        function isCharacterInActiveZone_8() { return (charX >= 363 && charX <= 363 + 208 && charY >= 451 && charY <= 451 + 220); }
        function isCharacterInActiveZone_9() { return (charX >= 444 && charX <= 444 + 208 && charY >= 458 && charY <= 458 + 220); }
        function isCharacterInActiveZone_10() { return (charX >= 0 && charX <= 0 + 104 && charY >= 375 && charY <= 375 + 220); } 

        function showDialogueUI() {
            dialogueBoxLayer.style.opacity = '1';
            dialogueArrowLayer.style.opacity = '1';
        }

        function hideDialogueUI() {
            dialogueBoxLayer.style.opacity = '0';
            dialogueArrowLayer.style.opacity = '0';
        }

        // 3턴제 대화 제어 매크로 엔진 (0 -> 1 -> 2 -> 3 -> 0)
        function createThreeTurnTalk(zoneNum, stateGetter, stateSetter, data) {
            return function() {
                let state = stateGetter();
                if (state === 0) {
                    nameTextContainer.textContent = data.turn1.name;
                    dialogueContainer.textContent = data.turn1.dialogue;
                    ldImg.src = `ld${zoneNum}.png`;
                    ldLayer.style.opacity = '1'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '1';
                    nameTextContainer.style.opacity = '1'; dialogueContainer.style.opacity = '1';
                    showDialogueUI();
                    stateSetter(1);
                } else if (state === 1) {
                    nameTextContainer.textContent = data.turn2.name;
                    dialogueContainer.textContent = data.turn2.dialogue;
                    ld2Img.src = data.turn2.img; 
                    ldLayer.style.opacity = '0'; ld2Layer.style.opacity = '1'; nameLayer.style.opacity = '1';
                    stateSetter(2);
                } else if (state === 2) {
                    nameTextContainer.textContent = data.turn3.name;
                    dialogueContainer.textContent = data.turn3.dialogue;
                    ldImg.src = data.turn3.img; 
                    ldLayer.style.opacity = '1'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '1';
                    stateSetter(3);
                } else {
                    ldLayer.style.opacity = '0'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '0';
                    nameTextContainer.style.opacity = '0'; dialogueContainer.style.opacity = '0';
                    nameTextContainer.textContent = ""; dialogueContainer.textContent = "";
                    hideDialogueUI();
                    stateSetter(0);
                }
            };
        }

        // 2턴제 대화 제어 매크로 엔진 (0 -> 1 -> 2 -> 0)
        function createTwoTurnTalk(zoneNum, stateGetter, stateSetter, data) {
            return function() {
                let state = stateGetter();
                if (state === 0) {
                    nameTextContainer.textContent = data.turn1.name;
                    dialogueContainer.textContent = data.turn1.dialogue;
                    ldImg.src = `ld${zoneNum}.png`;
                    ldLayer.style.opacity = '1'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '1';
                    nameTextContainer.style.opacity = '1'; dialogueContainer.style.opacity = '1';
                    showDialogueUI();
                    stateSetter(1);
                } else if (state === 1) {
                    nameTextContainer.textContent = data.turn2.name;
                    dialogueContainer.textContent = data.turn2.dialogue;
                    ld2Img.src = data.turn2.img; 
                    ldLayer.style.opacity = '0'; ld2Layer.style.opacity = '1'; nameLayer.style.opacity = '1';
                    stateSetter(2);
                } else {
                    ldLayer.style.opacity = '0'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '0';
                    nameTextContainer.style.opacity = '0'; dialogueContainer.style.opacity = '0';
                    nameTextContainer.textContent = ""; dialogueContainer.textContent = "";
                    hideDialogueUI();
                    stateSetter(0);
                }
            };
        }

        // 1턴제 대화 제어 매크로 엔진 (0 -> 1 -> 0)
        function createOneTurnTalk(zoneNum, stateGetter, stateSetter, data) {
            return function() {
                let state = stateGetter();
                if (state === 0) {
                    nameTextContainer.textContent = data.turn1.name;
                    dialogueContainer.textContent = data.turn1.dialogue;
                    ldImg.src = `ld${zoneNum}.png`; 
                    ldLayer.style.opacity = '1'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '1';
                    nameTextContainer.style.opacity = '1'; dialogueContainer.style.opacity = '1';
                    showDialogueUI();
                    stateSetter(1);
                } else {
                    ldLayer.style.opacity = '0'; ld2Layer.style.opacity = '0'; nameLayer.style.opacity = '0';
                    nameTextContainer.style.opacity = '0'; dialogueContainer.style.opacity = '0';
                    nameTextContainer.textContent = ""; dialogueContainer.textContent = "";
                    hideDialogueUI();
                    stateSetter(0);
                }
            };
        }

        /* ==========================================================================
           [대화 시나리오 스크립트 데이터셋 매핑 구역]
           ========================================================================== */

        const toggleLargeCharacter_1 = createThreeTurnTalk(1, () => ldState_1, (val) => ldState_1 = val, {
            turn1: { name: "쿠루스 레이지", dialogue: "하다하다 이런 데까지 와보네." },
            turn2: { name: "사이토 카야", dialogue: "레-쨩 부적 가져왔어? 나 가방을 두고왔지 뭐야~", img: "ld1_2.png" },
            turn3: { name: "쿠루스 레이지", dialogue: "아, 찾아볼게.", img: "ld1_3.png" }
        });

        const toggleLargeCharacter_9 = createThreeTurnTalk(9, () => ldState_9, (val) => ldState_9 = val, {
            turn1: { name: "쿠로사와 나기히토", dialogue: "왜 내 옷은 이 모양인걸까.." },
            turn2: { name: "류가 타카루", dialogue: "왜~ 잘 어울리는 것 같은데?", img: "ld9_2.png" },
            turn3: { name: "쿠로사와 나기히토", dialogue: "놀리는거면 그만둬..", img: "ld9_3.png" }
        });

        const toggleLargeCharacter_3 = createTwoTurnTalk(3, () => ldState_3, (val) => ldState_3 = val, {
            turn1: { name: "세리자와 타쿠미", dialogue: "왜인지 저만 와인이 있어요! 드실래요?" },
            turn2: { name: "타카세 료", dialogue: "아니..~ㅎㅎ", img: "ld3_2.png" }
        });

        const toggleLargeCharacter_5 = createTwoTurnTalk(5, () => ldState_5, (val) => ldState_5 = val, {
            turn1: { name: "메이토 라오", dialogue: "뭔가 에로하네~^^" },
            turn2: { name: "나카하라 코즈에", dialogue: "...씨발!!! 니 좆 잘라버릴거야!!", img: "ld5_2.png" }
        });

        const toggleLargeCharacter_2 = createOneTurnTalk(2, () => ldState_2, (val) => ldState_2 = val, {
            turn1: { name: "사이토 카야", dialogue: "꺄-♡ 이번엔 재밌는 괴담이잖아! 그나저나 카야삐 메이드 어때? 너무 귀엽지!" }
        });

        const toggleLargeCharacter_4 = createOneTurnTalk(4, () => ldState_4, (val) => ldState_4 = val, {
            turn1: { name: "나카하라 코즈에", dialogue: "...기분이 좋아지긴 했는데 (하아) 씨발 옷꼬라지는 왜 이러는 거야 존나 불편하게... 개빡쳐" }
        });

        const toggleLargeCharacter_6 = createOneTurnTalk(6, () => ldState_6, (val) => ldState_6 = val, {
            turn1: { name: "히데야마 코타", dialogue: "...썩 유쾌하진 않군요." }
        });

        const toggleLargeCharacter_7 = createOneTurnTalk(7, () => ldState_7, (val) => ldState_7 = val, {
            turn1: { name: "시키 유우이치", dialogue: "@#%^&!!!이게 뭔 옷이야!!!!!" }
        });

        const toggleLargeCharacter_8 = createOneTurnTalk(8, () => ldState_8, (val) => ldState_8 = val, {
            turn1: { name: "류가 타카루", dialogue: "레스토랑이라니~ 고급지네요 ^-^!" }
        });

        const toggleLargeCharacter_10 = createOneTurnTalk(10, () => ldState_10, (val) => ldState_10 = val, {
            turn1: { name: "시로가네 루이", dialogue: "...구경 났어요?" }
        });

        /* ========================================================================== */

        function resetAllTalkStates() {
            ldState_1 = 0; ldState_2 = 0; ldState_3 = 0; ldState_4 = 0; ldState_5 = 0;
            ldState_6 = 0; ldState_7 = 0; ldState_8 = 0; ldState_9 = 0; ldState_10 = 0;
            
            ldLayer.style.opacity = '0';
            ld2Layer.style.opacity = '0';
            nameLayer.style.opacity = '0';
            nameTextContainer.style.opacity = '0';
            dialogueContainer.style.opacity = '0';
            nameTextContainer.textContent = "";
            dialogueContainer.textContent = "";
            
            hideDialogueUI();
        }

        const startBtn = document.getElementById('start-btn');
        const introElements = document.querySelectorAll('.intro-set');
        let isIntroActive = true; 

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isIntroActive) return; 
            introElements.forEach(el => { el.style.opacity = '0'; });
            setTimeout(() => {
                introElements.forEach(el => el.remove());
                startBtn.remove(); 
            }, 800);
            isIntroActive = false; 
        });

        const character = document.getElementById('character');
        const charImg = document.getElementById('char-img');
        let charX = 896, charY = 400;
        const charWidth = 128, charHeight = 128, baseMoveSpeed = 14.4; 
        let activeKey = null, animInterval = null, currentFrame = 1;

        document.body.addEventListener('keydown', (e) => {
            if (isIntroActive) return;
            
            // [고도화] 가속 제어 키 바인딩: ControlLeft 또는 ControlRight 탐지 시 가속 플래그 On
            if (e.code === 'ControlLeft' || e.code === 'ControlRight') {
                e.preventDefault();
                isControlPressed = true;
                return;
            }
            
            // 대화창 트리거는 스페이스바 시스템 유지 (가속 기능과 물리적 완전 독립)
            if (e.code === 'Space') { 
                e.preventDefault(); 
                
                if (globalCurrentZone === 1)  toggleLargeCharacter_1();
                else if (globalCurrentZone === 2)  toggleLargeCharacter_2();
                else if (globalCurrentZone === 3)  toggleLargeCharacter_3();
                else if (globalCurrentZone === 4)  toggleLargeCharacter_4();
                else if (globalCurrentZone === 5)  toggleLargeCharacter_5();
                else if (globalCurrentZone === 6)  toggleLargeCharacter_6();
                else if (globalCurrentZone === 7)  toggleLargeCharacter_7();
                else if (globalCurrentZone === 8)  toggleLargeCharacter_8();
                else if (globalCurrentZone === 9)  toggleLargeCharacter_9();
                else if (globalCurrentZone === 10) toggleLargeCharacter_10();
                
                return; 
            }
            
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
                if (activeKey === e.code) return;
                activeKey = e.code; currentFrame = 1;
                clearInterval(animInterval);
                updateMovement();
                animInterval = setInterval(updateMovement, 70);
            }
        });

        document.body.addEventListener('keyup', (e) => {
            if (isIntroActive) return;
            
            // [고도화] Control 키를 물리적으로 떼었을 때 실시간으로 가속 종료 연산 처리
            if (e.code === 'ControlLeft' || e.code === 'ControlRight') {
                isControlPressed = false;
                return;
            }
            
            if (e.code === activeKey) {
                clearInterval(animInterval);
                const stopMap = { ArrowLeft: 'r6.png', ArrowRight: 'l6.png', ArrowDown: 'f1.png', ArrowUp: 'b1.png' };
                charImg.src = stopMap[activeKey] || 'f1.png';
                activeKey = null;
            }
        });

        function updateMovement() {
            if (!activeKey) return;
            let nextX = charX, nextY = charY;
            
            // [고도화] 스페이스바 대신 컨트롤 키 플래그(isControlPressed) 검사 구문으로 대체 및 속도 1.5배 스케일링
            const currentSpeed = isControlPressed ? (baseMoveSpeed * 1.5) : baseMoveSpeed;

            if (activeKey === 'ArrowLeft') { nextX -= currentSpeed; charImg.src = `r${currentFrame}.png`; }
            else if (activeKey === 'ArrowRight') { nextX += currentSpeed; charImg.src = `l${currentFrame}.png`; }
            else if (activeKey === 'ArrowDown') { nextY += currentSpeed; charImg.src = `f${currentFrame}.png`; }
            else if (activeKey === 'ArrowUp') { nextY -= currentSpeed; charImg.src = `b${currentFrame}.png`; }

            if (nextX < 0) nextX = 0;
            if (nextX > 1920 - charWidth) nextX = 1920 - charWidth;
            if (nextY < 0) nextY = 0;
            if (nextY > 1080 - charHeight) nextY = 1080 - charHeight;

            const nx = nextX / 1920 * 100;
            const ny = nextY / 1080 * 100;
            const cw = charWidth / 1920 * 100;
            const ch = charHeight / 1080 * 100;
            let canMove = true;

            if (ny < 33.24) canMove = false; 
            if (ny < 40.73 && nx < 27.44) canMove = false; 
            if (ny < 47.40 && nx < 27.44) canMove = false; 
            if (ny < 47.40 && (nx + cw) > 72.55) canMove = false; 
            if (ny < 40.73 && (nx + cw) > 100) canMove = false; 

            const newZones = [
                { x: 5.2604,   y: 61.2037, w: 10.4167, h: 2.5926 }, 
                { x: 11.8229,  y: 80.0926,  w: 10.4167, h: 2.5926 }, 
                { x: 27.7083,  y: 70.7407, w: 10.4167, h: 2.5926 }, 
                { x: 27.7083,  y: 95.5556, w: 12.1875, h: 4.4444 }, 
                { x: 61.9271,  y: 70.7407, w: 10.4167, h: 2.5926 }, 
                { x: 61.9271,  y: 95.5556, w: 12.1875, h: 4.4444 }, 
                { x: 84.375,   y: 61.2037, w: 10.4167, h: 2.5926 }, 
                { x: 77.8125,  y: 80.0926, w: 10.4167, h: 2.5926 }  
            ];

            for (let i = 0; i < newZones.length; i++) {
                const z = newZones[i];
                if (nx < z.x + z.w && nx + cw > z.x && ny < z.y + z.h && ny + ch > z.y) {
                    canMove = false;
                    break;
                }
            }

            if (canMove) { 
                charX = nextX; charY = nextY; 
                let targetZ = 10; 
                if (charX >= 0 && charX <= 700) { if (charY >= 500) targetZ = 15; } 
                else if (charX > 700 && charX <= 1040) { if (charY >= 480) targetZ = 15; } 
                else if (charX > 1040 && charX <= 1300) { if (charY >= 550) targetZ = 15; } 
                else if (charX > 1300) { if (charY >= 526) targetZ = 15; }
                character.style.zIndex = targetZ;
            }
            
            character.style.left = (charX / 1920 * 100) + '%';
            character.style.top = (charY / 1080 * 100) + '%';
            currentFrame = (currentFrame >= 6) ? 1 : currentFrame + 1;

            const detectedZones = [];

            if (isCharacterInActiveZone_1())  detectedZones.push({ id: 1,  yStart: 440 });
            if (isCharacterInActiveZone_2())  detectedZones.push({ id: 2,  yStart: 459 });
            if (isCharacterInActiveZone_3())  detectedZones.push({ id: 3,  yStart: 503 });
            if (isCharacterInActiveZone_4())  detectedZones.push({ id: 4,  yStart: 542 });
            if (isCharacterInActiveZone_5())  detectedZones.push({ id: 5,  yStart: 507 });
            if (isCharacterInActiveZone_6())  detectedZones.push({ id: 6,  yStart: 489 });
            if (isCharacterInActiveZone_7())  detectedZones.push({ id: 7,  yStart: 417 });
            if (isCharacterInActiveZone_8())  detectedZones.push({ id: 8,  yStart: 451 });
            if (isCharacterInActiveZone_9())  detectedZones.push({ id: 9,  yStart: 458 });
            if (isCharacterInActiveZone_10()) detectedZones.push({ id: 10, yStart: 375 });

            let previousZone = globalCurrentZone;

            if (detectedZones.length > 0) {
                detectedZones.sort((a, b) => b.yStart - a.yStart);
                globalCurrentZone = detectedZones[0].id;
            } else {
                globalCurrentZone = 0;
            }

            if (globalCurrentZone !== previousZone || globalCurrentZone === 0) {
                resetAllTalkStates();
            }

            if (globalCurrentZone > 0) {
                redImg.src = `red${globalCurrentZone}.png`;
                redLayer.style.opacity = '1'; 
            } else {
                redLayer.style.opacity = '0'; 
            }
        }
    </script>
</body>
</html>
